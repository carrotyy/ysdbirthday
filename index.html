<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Kejutan Kembang Api & Tiup Lilin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LAYAR PERTAMA: Gelap Gulita -->
  <div id="layar-hitam" class="layar">
    <button id="btn-lights" class="tombol">Turn On Lights</button>
  </div>

  <!-- LAYAR KEDUA: Biru Gelap dengan Countdown -->
  <div id="layar-biru" class="layar">
    <h2 id="judul-tunggu">Menunggu Momen Spesial...</h2>
    
    <div id="countdown">
      <div class="waktu"><span id="hari">00</span><small>Hari</small></div>
      <div class="waktu"><span id="jam">00</span><small>Jam</small></div>
      <div class="waktu"><span id="menit">00</span><small>Menit</small></div>
      <div class="waktu"><span id="detik">00</span><small>Detik</small></div>
    </div>

    <button id="btn-world" class="tombol tersembunyi">Into Your World</button>
  </div>

  <!-- Kanvas Kembang Api -->
  <canvas id="birthday"></canvas>

  <!-- BAGIAN KUE ULANG TAHUN -->
  <div class="cake-section">
    <div class="container">
      <div id="cake-container">
        <img id="cake-png" src="cake.png" alt="Kue Ulang Tahun">
        <canvas id="cake-candle-canvas"></canvas>
 
        <div class="greeting-card" id="greeting-card">
          <div id="lottie-confetti" style="width:320px;max-width:90vw;margin:0 auto;"></div>
 
          <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px;">
            
            <!-- Teks lama dihapus, menyisakan div kosong agar JS tidak error -->
            <div id="congrats-message" style="display: none;"></div>
 
            <div id="celebrate-message" style="display: none;">
              🎉 Happy Birthday YUSDAA! 🎉
              <audio id="lagu-mp3" src="lagu.mp3"></audio>
            </div>
 
            <!-- Tombol Baru Wishes dan Reset -->
            <button class="btn-main" id="btn-wishes" style="display: none;">Wishes</button>
            <button class="btn-secondary" id="reset-btn" style="display: none;">Ulangi Lagi</button>
          </div>
        </div>
      </div>
 
      <button class="btn-main" id="blow-instruction">Klik untuk meniup lilin!</button>

      <div id="instruction-text">
        <p style="margin-top: 20px; text-align: center;">Pertama, buatlah permohonan. Lalu katakan:</p>
        <h2 style="margin-top: 5px; text-align: center;">"Happy birthday!" lalu tiup layarmu!</h2>
      </div>
    </div>
  </div>

  <!-- LAYAR WISHES (Halaman Baru) -->
  <div id="layar-wishes" class="layar hilang">
    <div class="wishes-box">
      <h2>Uji coba untuk tulisan wishes</h2>
    </div>
  </div>

  <!-- Script -->
  <script src="https://unpkg.com/lottie-web@5.12.2/build/player/lottie.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
